spring.application.name=rockcatalog

# Banco H2 salvo em arquivo (./data/rockcatalog.mv.db) para os dados
# nao sumirem toda vez que voce reiniciar o servidor.
spring.datasource.url=jdbc:h2:file:./data/rockcatalog
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ddl-auto=update: o Hibernate cria/ajusta as tabelas sozinho com base nas
# minhas entidades (@Entity). Bom pra projeto pequeno; num projeto maior eu
# usaria migrations (Flyway/Liquibase) em vez disso.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console web do H2, util para inspecionar o banco em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desativa o cache dos templates Thymeleaf, assim quando eu edito um .html
# e recarrego a página no navegador a mudança já aparece, sem precisar
# reiniciar o servidor toda vez.
spring.thymeleaf.cache=false

server.port=8081
